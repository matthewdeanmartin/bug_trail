[project]
name = "bug-trail-core"
version = "3.2.0"
description = "Core library for bug-trail error logging."
authors = [
    { name = "Matthew Martin", email = "matthewdeanmartin@gmail.com" },
]
license = { text = "MIT" }
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "psutil",
    "platformdirs",
]

[project.optional-dependencies]
web = ["bug-trail>=3.2.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/bug_trail_core"]

[tool.hatch.build.targets.sdist]
include = [
    "src/bug_trail_core/*.sql",
    "src/bug_trail_core/py.typed",
]
