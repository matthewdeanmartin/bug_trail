[project]
name = "bug-trail"
version = "3.1.0"
description = "Local static html error logger to use while developing python code."
authors = [
    { name = "Matthew Martin", email = "matthewdeanmartin@gmail.com" },
]
license = { text = "MIT" }
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "bug-trail-core",
    "humanize",
    "jinja2>=3.1.2",
    "pygments",
    "watchdog>=3.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/bug_trail"]

[tool.hatch.build.targets.sdist]
include = [
    "src/bug_trail/*.jinja",
    "src/bug_trail/py.typed",
    "src/bug_trail/assets/",
]

[tool.uv.sources]
bug-trail-core = { workspace = true }
