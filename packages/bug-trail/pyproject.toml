[project]
name = "bug-trail"
version = "3.2.0"
description = "Local FastAPI web server for viewing bug_trail error logs while developing python code."
authors = [
    { name = "Matthew Martin", email = "matthewdeanmartin@gmail.com" },
]
license = { text = "MIT" }
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "bug-trail-core",
    "fastapi",
    "uvicorn[standard]",
    "humanize",
    "jinja2>=3.1.2",
    "python-multipart",
    "watchdog>=3.0.0",
]

[project.scripts]
bug_trail = "bug_trail.__main__:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/bug_trail"]

[tool.hatch.build.targets.sdist]
include = [
    "src/bug_trail/templates/*.jinja",
    "src/bug_trail/py.typed",
    "src/bug_trail/static/",
]

[tool.uv.sources]
bug-trail-core = { workspace = true }
